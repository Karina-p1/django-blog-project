<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Post</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #faf8f3;
        font-family: "Source Sans 3", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      nav {
        background: #1a1a2e;
        padding: 0 2rem;
        display: flex;
        align-items: center;
        height: 64px;
      }
      .nav-brand {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: #fff;
        text-decoration: none;
      }
      .nav-brand span {
        color: #c0392b;
      }
      .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e8e0d0;
        border-radius: 12px;
        padding: 2.5rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.75rem;
        font-weight: 900;
        margin-bottom: 0.75rem;
      }
      .post-title {
        font-style: italic;
        color: #7f8c8d;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
      }
      p {
        color: #555;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .btn-row {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
      }
      .btn-danger {
        background: #c0392b;
        color: #fff;
        border: none;
        padding: 0.7rem 1.75rem;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s;
      }
      .btn-danger:hover {
        background: #a93226;
      }
      .btn-cancel {
        background: #fff;
        color: #333;
        border: 1px solid #e8e0d0;
        padding: 0.7rem 1.75rem;
        border-radius: 6px;
        font-size: 0.95rem;
        font-family: inherit;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: background 0.2s;
      }
      .btn-cancel:hover {
        background: #faf8f3;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="{% url 'home' %}" class="nav-brand">The<span>Blog</span></a>
    </nav>
    <div class="main">
      <div class="card">
        <div class="icon">🗑️</div>
        <h1>Delete Post?</h1>
        <p class="post-title">"{{ post.title }}"</p>
        <p>
          This action <strong>cannot be undone</strong>. The post and all its
          comments will be permanently removed.
        </p>
        <div class="btn-row">
          <form method="POST" style="display: inline">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Yes, Delete It</button>
          </form>
          <a href="{% url 'post_detail' post.id %}" class="btn-cancel"
            >Cancel</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
