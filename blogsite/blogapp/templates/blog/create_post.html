<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #faf8f3;
        font-family: "Source Sans 3", sans-serif;
      }
      nav {
        background: #1a1a2e;
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .nav-brand {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: #fff;
        text-decoration: none;
      }
      .nav-brand span {
        color: #c0392b;
      }
      .nav-links a {
        color: #ccc;
        text-decoration: none;
        font-size: 0.9rem;
        padding: 0.4rem 0.9rem;
      }
      .container {
        max-width: 680px;
        margin: 3rem auto;
        padding: 0 2rem;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: #7f8c8d;
        text-decoration: none;
        font-size: 0.85rem;
        margin-bottom: 2rem;
      }
      .back-link:hover {
        color: #1a1a2e;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 2rem;
        font-weight: 900;
        margin-bottom: 2rem;
      }
      .form-card {
        background: #fff;
        border: 1px solid #e8e0d0;
        border-radius: 12px;
        padding: 2rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
        margin-top: 1.25rem;
        color: #333;
      }
      label:first-child {
        margin-top: 0;
      }
      input[type="text"],
      textarea {
        width: 100%;
        padding: 0.7rem 0.9rem;
        border: 1px solid #e8e0d0;
        border-radius: 6px;
        font-size: 0.95rem;
        font-family: inherit;
        background: #faf8f3;
        transition: border-color 0.2s;
      }
      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: #c0392b;
      }
      textarea {
        min-height: 220px;
        resize: vertical;
      }
      .image-upload-area {
        border: 2px dashed #e8e0d0;
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        position: relative;
        background: #faf8f3;
      }
      .image-upload-area:hover {
        border-color: #c0392b;
        background: #fff8f7;
      }
      .image-upload-area input[type="file"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
      }
      .upload-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      .upload-text {
        font-size: 0.9rem;
        color: #7f8c8d;
      }
      .upload-text strong {
        color: #c0392b;
      }
      .image-preview {
        margin-top: 1rem;
        display: none;
      }
      .image-preview img {
        max-width: 100%;
        max-height: 200px;
        border-radius: 6px;
        object-fit: cover;
        border: 1px solid #e8e0d0;
      }
      .file-name {
        margin-top: 0.5rem;
        font-size: 0.82rem;
        color: #7f8c8d;
      }
      .btn-submit {
        margin-top: 1.5rem;
        background: #1a1a2e;
        color: #fff;
        border: none;
        padding: 0.7rem 2rem;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s;
      }
      .btn-submit:hover {
        background: #c0392b;
      }
      .optional-badge {
        font-size: 0.75rem;
        color: #aaa;
        font-weight: 400;
        margin-left: 0.4rem;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="{% url 'home' %}" class="nav-brand">The<span>Blog</span></a>
      <div class="nav-links"><a href="{% url 'logout' %}">Logout</a></div>
    </nav>
    <div class="container">
      <a href="{% url 'home' %}" class="back-link">← Back to posts</a>
      <h1>Create New Post</h1>
      <div class="form-card">
        <!-- enctype="multipart/form-data" is REQUIRED for image uploads -->
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          <label for="id_title">Title</label>
          {{ form.title }}
          <label for="id_content">Content</label>
          {{ form.content }}
          <label
            >Cover Image <span class="optional-badge">optional</span></label
          >
          <div class="image-upload-area">
            {{ form.image }}
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">
              <strong>Click to upload</strong> or drag & drop<br />JPG, PNG,
              GIF, WEBP
            </div>
          </div>
          <div class="image-preview" id="imagePreview">
            <img id="previewImg" src="" alt="Preview" />
            <p class="file-name" id="fileName"></p>
          </div>
          <button type="submit" class="btn-submit">Publish Post</button>
        </form>
      </div>
    </div>
    <script>
      const fileInput = document.querySelector('input[type="file"]');
      const preview = document.getElementById("imagePreview");
      const previewImg = document.getElementById("previewImg");
      const fileName = document.getElementById("fileName");
      fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            previewImg.src = e.target.result;
            fileName.textContent = file.name;
            preview.style.display = "block";
          };
          reader.readAsDataURL(file);
        } else {
          preview.style.display = "none";
        }
      });
    </script>
  </body>
</html>
