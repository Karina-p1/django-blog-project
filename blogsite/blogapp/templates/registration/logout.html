<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logged Out</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #faf8f3;
        font-family: "Source Sans 3", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #fff;
        border: 1px solid #e8e0d0;
        border-radius: 16px;
        padding: 3rem 2.5rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.07);
      }

      .icon {
        font-size: 3.5rem;
        margin-bottom: 1.25rem;
        display: block;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 2rem;
        font-weight: 900;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
      }

      p {
        color: #7f8c8d;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn-row {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.65rem 1.5rem;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
        font-family: inherit;
      }

      .btn-primary {
        background: #1a1a2e;
        color: #fff;
      }
      .btn-primary:hover {
        background: #c0392b;
      }

      .btn-secondary {
        background: #fff;
        color: #333;
        border: 1px solid #e8e0d0;
      }
      .btn-secondary:hover {
        background: #faf8f3;
      }

      .divider {
        height: 1px;
        background: #e8e0d0;
        margin: 1.75rem 0;
      }

      .brand {
        font-family: "Playfair Display", serif;
        font-size: 1.1rem;
        color: #1a1a2e;
        text-decoration: none;
        display: inline-block;
        margin-bottom: 2rem;
      }
      .brand span {
        color: #c0392b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <a href="{% url 'home' %}" class="brand">The<span>Blog</span></a>

      <h1>See you later!</h1>
      <p>
        You've been successfully logged out. Come back anytime to read and share
        stories.
      </p>

      <div class="btn-row">
        <a href="{% url 'login' %}" class="btn btn-primary">Log Back In</a>
        <a href="{% url 'home' %}" class="btn btn-secondary">Browse Posts</a>
      </div>

      <div class="divider"></div>

      <p style="font-size: 0.82rem; margin-bottom: 0">
        Don't have an account?
        <a
          href="{% url 'register' %}"
          style="color: #c0392b; font-weight: 600; text-decoration: none"
          >Register here</a
        >
      </p>
    </div>
  </body>
</html>
